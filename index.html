<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="assets/flexboxgrid2.css">
    <title>Отсчет до 2023 года</title>
</head>
<body>
    <div class="container">
        <div class="label" id="label">
            До 2023 Года осталось:
        </div>
        <div class="card-area">
            <div class="card">
                <div class="card__count" id="days">0</div>
                <div class="card__label">Дней</div>
            </div>
            <div class="card">
                <div class="card__count" id="hours">0</div>
                <div class="card__label">Часов</div>
            </div>
            <div class="card">
                <div class="card__count" id="mins">0</div>
                <div class="card__label">Минут</div>
            </div>
            <div class="card">
                <div class="card__count" id="secs">0</div>
                <div class="card__label">Секунд</div>
            </div>
        </div>
        
    </div>


    <!-- скрипт добавляем в самом конце, иначе getElementById вернет значение null-->
    <script type="text/javascript" src="./assets/main.js"></script> 
</body>
</html>
